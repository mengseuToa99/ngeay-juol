<!DOCTYPE html>
<html lang="km" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#059669">
    <title>គ្មានអ៊ីនធឺណិត — ងាយជួល</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 50%, #d1fae5 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #1a1a2e;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(5, 150, 105, 0.15);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(5, 150, 105, 0.08), 0 1px 2px rgba(0,0,0,0.04);
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #059669, #047857);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
        }

        .icon-wrap svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: white;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            margin-bottom: 1.25rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f1f14;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }

        .sub {
            font-size: 0.95rem;
            color: #4b7a5f;
            margin-bottom: 0.25rem;
        }

        .en {
            font-size: 0.82rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.75rem 1.25rem;
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            border-radius: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 0.65rem 1.25rem;
            background: transparent;
            color: #059669;
            font-weight: 500;
            font-size: 0.85rem;
            border: 1px solid rgba(5, 150, 105, 0.3);
            border-radius: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-secondary:hover { background: rgba(5, 150, 105, 0.06); }

        .footer-note {
            margin-top: 1.75rem;
            font-size: 0.72rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <!-- wifi-off icon -->
            <svg viewBox="0 0 24 24">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.8"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <circle cx="12" cy="20" r="1" fill="white" stroke="none"/>
            </svg>
        </div>

        <div class="badge">Offline</div>

        <h1>គ្មានអ៊ីនធឺណិត</h1>
        <p class="sub">ត្រូវការការតភ្ជាប់អ៊ីនធឺណិត</p>
        <p class="en">You need an internet connection to use billing and payment features.</p>

        <div class="actions">
            <button class="btn-primary" onclick="window.location.reload()">
                🔄 ព្យាយាមម្ដងទៀត — Try Again
            </button>
            <a class="btn-secondary" href="/landlord/simple">
                ← ត្រឡប់ទៅ Dashboard — Go to Dashboard
            </a>
        </div>

        <p class="footer-note">ងាយជួល · ngeay juol</p>
    </div>
</body>
</html>
